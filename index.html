<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo App – Redux</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📝 ToDo App <small>(Redux)</small></h1>
        <button id="theme-toggle" aria-label="Toggle dark/light mode">
          🌙
        </button>
      </header>

      <!-- AddTask Component -->
      <div id="add-task-component">
        <form id="task-form">
          <input
            type="text"
            id="task-input"
            placeholder="Add a new task..."
            autocomplete="off"
            required
          />
          <button type="submit" id="add-btn">Add</button>
        </form>
      </div>

      <!-- Filter buttons -->
      <div id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="done">Done</button>
        <button class="filter-btn" data-filter="not-done">Not Done</button>
      </div>

      <!-- ListTask Component -->
      <ul id="task-list"></ul>

      <footer id="task-stats">
        <span id="task-count">0 tasks</span>
        <button id="clear-completed">Clear completed</button>
      </footer>
    </div>

    <!-- Redux CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
